id: 1-column-tall
version: "2.0.0"
name: 1 column (tall)

page:
  size: HALF_A4_TALL
  margins:
    top: 20
    right: 15
    bottom: 20
    left: 15

regions:
  header:
    height: 50
  title:
    height: 22
  footer:
    height: 30

body:
  container:
    type: GRID
    cols: 1
    rowHeight: 35
    gapX: 0
    gapY: 6

banner:
  enabled: true
  heightPt: 55
  stripHeightPt: 12
  showTitleBar: true

tiles:
  LOGO:
    region: header
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 40
      paddingTop: 5
      paddingBottom: 5
      totalHeight: 50

  LOGO_BODY:
    region: body
    colSpan: 1
    rowSpan: 2
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 54
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 76

  TITLE:
    region: title
    style:
      background:
        color: "bannerSurface"
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 0
      paddingBottom: 0
      totalHeight: 22

  SECTION_HEADER:
    region: body
    colSpan: 1
    style:
      typography:
        fontSet: "system-sans-bold"
        fontSize: "lg"
        fontWeight: "bold"
        textAlign: "center"
        lineHeight: "normal"
        letterSpacing: 0.8
        textTransform: "capitalize"
        decoration: "none"
      spacing:
        paddingLeft: 8
        paddingTop: 14
        paddingBottom: 0
      border:
        width: 0.6
        style: "solid"
        sides: ["bottom"]
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 6
      paddingBottom: 4
      totalHeight: 35

  # ITEM_CARD available but narrow format favours ITEM_TEXT_ROW
  # Height formula: rowSpan * rowHeight + (rowSpan - 1) * gapY
  #   = 4 * 35 + 3 * 6 = 158pt actual height
  ITEM_CARD:
    region: body
    rowSpan: 4
    style:
      typography:
        name:
          fontSet: "system-sans"
          fontSize: "xsm"
          fontWeight: "bold"
          textTransform: "capitalize"
        description:
          fontSet: "modern-sans"
          fontSize: "xxs"
          fontWeight: "normal"
          lineHeight: "normal"
        price:
          fontSet: "modern-sans"
          fontSize: "xs"
          fontWeight: "bold"
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 14
      imageBoxHeight: 50
      paddingTop: 6
      paddingBottom: 6
      totalHeight: 158

  # Preferred tile type for narrow single-column format
  # Height formula: rowSpan * rowHeight + (rowSpan - 1) * gapY
  #   = 2 * 35 + 1 * 6 = 76pt actual height
  ITEM_TEXT_ROW:
    region: body
    rowSpan: 2
    style:
      typography:
        name:
          fontSet: "system-sans"
          fontSize: "xsm"
          fontWeight: "bold"
          textTransform: "capitalize"
        description:
          fontSet: "modern-sans"
          fontSize: "xxs"
          fontWeight: "normal"
          lineHeight: "normal"
        price:
          fontSet: "modern-sans"
          fontSize: "xs"
          fontWeight: "bold"
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 14
      imageBoxHeight: 0
      paddingTop: 6
      paddingBottom: 6
      totalHeight: 76

  FLAGSHIP_CARD:
    region: body
    colSpan: 1
    rowSpan: 4
    style:
      typography:
        name:
          fontSet: "system-sans"
          fontSize: "sm"
          fontWeight: "bold"
          textAlign: "left"
          textTransform: "capitalize"
    contentBudget:
      nameLines: 2
      descLines: 4
      indicatorAreaHeight: 14
      imageBoxHeight: 90
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 158

  FOOTER_INFO:
    region: footer
    style:
      typography:
        contact:
          fontSet: "modern-sans"
          fontSize: "xxs"
          fontWeight: "normal"
      border:
        width: 0.5
        style: "solid"
        sides: ["top"]
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 0
      totalHeight: 30

policies:
  lastRowBalancing: LEFT
  showLogoOnPages: [FIRST, CONTINUATION, FINAL, SINGLE]
  repeatSectionHeaderOnContinuation: true
  sectionHeaderKeepWithNextItems: 1

filler:
  enabled: false
  safeZones:
    - startRow: 0
      endRow: LAST_CONTENT
      startCol: 0
      endCol: 0
  tiles:
    - id: filler-blank
      style: color
      content: ''
      rowSpan: 1
  policy: SEQUENTIAL

capabilities:
  supportsBodyTileMode: true

itemIndicators:
  mode: INLINE
  maxCount: 3
  style:
    badgeSize: 12
    iconSet: emoji
  spiceScale:
    1: "🌶"
    2: "🌶🌶"
    3: "🌶🌶🌶"
  letterFallback:
    vegetarian: "V"
    vegan: "VG"
    halal: "H"
    kosher: "K"
    gluten-free: "GF"
