# Test-only fixture: dividers enabled for divider tests. Not shown in UI.
id: test-template-dividers
version: "1.0.0"
name: Test Template Dividers

page:
  size: A4_PORTRAIT
  margins:
    top: 22
    right: 25
    bottom: 22
    left: 25

regions:
  header:
    height: 60
  title:
    height: 32
  footer:
    height: 45

body:
  container:
    type: GRID
    cols: 4
    rowHeight: 70
    gapX: 8
    gapY: 8

tiles:
  LOGO:
    region: header
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 50
      paddingTop: 5
      paddingBottom: 5
      totalHeight: 60

  LOGO_BODY:
    region: body
    colSpan: 1
    rowSpan: 1
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 54
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 70

  TITLE:
    region: title
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 4
      totalHeight: 32

  SECTION_HEADER:
    region: body
    colSpan: 4
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 8
      paddingBottom: 4
      totalHeight: 24

  ITEM_CARD:
    region: body
    rowSpan: 2
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 16
      imageBoxHeight: 70
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 148

  ITEM_TEXT_ROW:
    region: body
    rowSpan: 1
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 16
      imageBoxHeight: 0
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 70

  FLAGSHIP_CARD:
    region: body
    colSpan: 2
    rowSpan: 2
    contentBudget:
      nameLines: 2
      descLines: 4
      indicatorAreaHeight: 16
      imageBoxHeight: 84
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 148

  DECORATIVE_DIVIDER:
    region: body
    colSpan: 4
    rowSpan: 1
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 4
      totalHeight: 70

dividers:
  enabled: true
  style: ornament
  height: 24

policies:
  lastRowBalancing: CENTER
  showLogoOnPages: [FIRST, CONTINUATION, FINAL, SINGLE]
  repeatSectionHeaderOnContinuation: true
  sectionHeaderKeepWithNextItems: 1

filler:
  enabled: false
  safeZones: []
  tiles: []
  policy: SEQUENTIAL

capabilities:
  supportsBodyTileMode: true

itemIndicators:
  mode: INLINE
  maxCount: 3
  style:
    badgeSize: 14
    iconSet: emoji
  spiceScale:
    1: "🌶"
    2: "🌶🌶"
    3: "🌶🌶🌶"
  letterFallback:
    vegetarian: "V"
    vegan: "VG"
    halal: "H"
    kosher: "K"
    gluten-free: "GF"
