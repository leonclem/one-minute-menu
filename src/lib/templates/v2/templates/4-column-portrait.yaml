id: 4-column-portrait
version: "2.0.0"
name: 4 column (portrait)

page:
  size: A4_PORTRAIT
  margins:
    top: 22.68    # ~8mm in points (reduced by 60%)
    right: 25.51  # ~9mm (reduced by 40%)
    bottom: 22.68
    left: 25.51

regions:
  header:
    height: 60
  title:
    height: 32
  footer:
    height: 38

body:
  container:
    type: GRID
    cols: 4
    rowHeight: 70
    gapX: 8
    gapY: 8

banner:
  enabled: true
  heightPt: 120
  stripHeightPt: 18

tiles:
  LOGO:
    region: header
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 50
      paddingTop: 5
      paddingBottom: 5
      totalHeight: 60

  TITLE:
    region: title
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 4
      totalHeight: 32

  SECTION_HEADER:
    region: body
    colSpan: 4
    style:
      typography:
        fontSet: "system-sans-bold"
        fontSize: "5xl"
        fontWeight: "bold"
        textAlign: "left"
        lineHeight: "normal"
        letterSpacing: 0.8
        textTransform: "capitalize"
        decoration: "none"
      spacing:
        paddingLeft: 4
        paddingTop: 24
        paddingBottom: 0
      border:
        width: 0.6
        style: "solid"
        sides: ["bottom"]
    contentBudget:
      nameLines: 1
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 8
      paddingBottom: 4
      totalHeight: 24

  # Grid math (rowHeight=70, gapY=8):
  #   ITEM_TEXT_ROW: 1 row  → 1×70             = 70pt   (text-only items)
  #   ITEM_CARD:     2 rows → 2×70 + 1×8       = 148pt  (items with images; featured use same footprint)
  ITEM_CARD:
    region: body
    rowSpan: 2
    style:
      typography:
        name:
          fontSet: "system-sans"
          fontSize: "xsm"
          fontWeight: "bold"
          textTransform: "capitalize"
        description:
          fontSet: "modern-sans"
          fontSize: "xxxs"
          fontWeight: "normal"
          lineHeight: "normal"
        price:
          fontSet: "modern-sans"
          fontSize: "xs"
          fontWeight: "bold"
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 16
      imageBoxHeight: 70
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 148

  ITEM_TEXT_ROW:
    region: body
    rowSpan: 1
    style:
      typography:
        name:
          fontSet: "system-sans"
          fontSize: "xsm"
          fontWeight: "bold"
          textTransform: "capitalize"
        description:
          fontSet: "modern-sans"
          fontSize: "xxxs"
          fontWeight: "normal"
          lineHeight: "normal"
        price:
          fontSet: "modern-sans"
          fontSize: "xs"
          fontWeight: "bold"
    contentBudget:
      nameLines: 2
      descLines: 3
      indicatorAreaHeight: 16
      imageBoxHeight: 0
      paddingTop: 8
      paddingBottom: 8
      totalHeight: 70

  FOOTER_INFO:
    region: footer
    style:
      typography:
        contact:
          fontSet: "modern-sans"
          fontSize: "xss"
          fontWeight: "normal"
      border:
        width: 1
        style: "solid"
        sides: ["top"]
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 0
      totalHeight: 38

  # DECORATIVE_DIVIDER: full-width divider between sections
  # Height formula: 1 * 70 + 0 * 8 = 70pt
  DECORATIVE_DIVIDER:
    region: body
    colSpan: 4
    rowSpan: 1
    contentBudget:
      nameLines: 0
      descLines: 0
      indicatorAreaHeight: 0
      imageBoxHeight: 0
      paddingTop: 4
      paddingBottom: 4
      totalHeight: 70

dividers:
  enabled: false
  style: ornament
  height: 24

policies:
  lastRowBalancing: CENTER
  showLogoOnPages: [FIRST, CONTINUATION, FINAL, SINGLE]
  repeatSectionHeaderOnContinuation: true
  sectionHeaderKeepWithNextItems: 1

filler:
  enabled: false
  safeZones:
    - startRow: 0
      endRow: LAST_CONTENT
      startCol: 0
      endCol: 3
  tiles:
    - id: filler-blank
      style: color
      content: ''
      rowSpan: 2
  policy: SEQUENTIAL

itemIndicators:
  mode: INLINE
  maxCount: 3
  style:
    badgeSize: 14
    iconSet: emoji
  spiceScale:
    1: "🌶"
    2: "🌶🌶"
    3: "🌶🌶🌶"
  letterFallback:
    vegetarian: "V"
    vegan: "VG"
    halal: "H"
    kosher: "K"
    gluten-free: "GF"
