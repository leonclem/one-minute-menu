<svg width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean white background with subtle texture -->
  <defs>
    <pattern id="linen-texture" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="#FAFAFA"/>
      <line x1="0" y1="0" x2="50" y2="50" stroke="#F0F0F0" stroke-width="0.5" opacity="0.3"/>
      <line x1="50" y1="0" x2="0" y2="50" stroke="#F0F0F0" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Base white with subtle texture -->
  <rect width="1024" height="1024" fill="url(#linen-texture)"/>
  
  <!-- Very subtle vignette -->
  <rect width="1024" height="1024" fill="url(#vignette)" opacity="0.05"/>
  <defs>
    <radialGradient id="vignette">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCCCCC"/>
    </radialGradient>
  </defs>
  
  <!-- Elegant border -->
  <rect x="100" y="100" width="824" height="824" fill="none" stroke="#E0E0E0" stroke-width="2" opacity="0.5"/>
  <rect x="110" y="110" width="804" height="804" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.3"/>
  
  <!-- Placeholder text -->
  <text x="512" y="480" font-family="Georgia, serif" font-size="48" fill="#666666" text-anchor="middle" opacity="0.3">
    MINIMAL BISTRO
  </text>
  <text x="512" y="540" font-family="Georgia, serif" font-size="24" fill="#999999" text-anchor="middle" opacity="0.3">
    Reference Style Image
  </text>
  <text x="512" y="580" font-family="Arial, sans-serif" font-size="18" fill="#AAAAAA" text-anchor="middle" opacity="0.2">
    Replace with actual elegant background
  </text>
</svg>
